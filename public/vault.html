<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h2>Your Vault</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="files"></div>

<button onclick="logout()">Logout</button>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location="login.html";

function loadFiles() {
  fetch("/files", {
    headers: { Authorization: token }
  })
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("files");
    div.innerHTML = "";

    data.forEach(f => {
      div.innerHTML += `
        <div class="file">
          ${f}<br>
          <button onclick="download('${f}')">Download</button>
          <button onclick="del('${f}')">Delete</button>
          <button onclick="share('${f}')">Share</button>
        </div>
      `;
    });
  });
}

function upload() {
  const file = document.getElementById("file").files[0];
  const form = new FormData();
  form.append("file", file);

  fetch("/upload", {
    method: "POST",
    headers: { Authorization: token },
    body: form
  }).then(() => loadFiles());
}

function download(name) {
  window.location = "/download/" + name;
}

function del(name) {
  fetch("/delete/" + name, {
    headers: { Authorization: token }
  }).then(() => loadFiles());
}

function share(name) {
  const toUser = prompt("Enter username:");
  fetch("/share", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({ toUser, fileName: name })
  });
}

function logout() {
  localStorage.removeItem("token");
  window.location = "/login.html";
}

loadFiles();
</script>

</body>
</html>
