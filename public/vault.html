<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="card">
  <h2>Your Vault</h2>

  <form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" multiple>
    <button>Upload</button>
  </form>

  <div id="files"></div>

  <a href="/logout"><button class="logout">Logout</button></a>
</div>

<script>
fetch("/files")
.then(res => res.json())
.then(data => {
  const div = document.getElementById("files");

  data.forEach(file => {
    div.innerHTML += `
      <div class="file">
        <p>${file}</p>

        <div class="actions">
          <a href="/download/${file}">Download</a>
          <a href="/delete/${file}">Delete</a>
        </div>

        <input placeholder="username to share" id="share-${file}">
        <button onclick="share('${file}')">Share</button>
      </div>
    `;
  });
});

function share(file) {
  const user = document.getElementById("share-" + file).value;

  fetch("/share", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ filename: file, toUser: user })
  })
  .then(res => res.text())
  .then(msg => alert(msg));
}
</script>

</body>
</html>
