<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h2>Your Vault</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="list"></div>

<button onclick="logout()" style="background:red;">Logout</button>
</div>

<script>
async function load() {
  const res = await fetch("/files");
  const files = await res.json();

  list.innerHTML = "";

  files.forEach(f => {
    list.innerHTML += `
      <p>${f.name}</p>
      <button onclick="download('${f.name}')">Download</button>
      <button onclick="del('${f.name}')">Delete</button>
      <button onclick="share('${f.name}')">Share</button>
      <hr>
    `;
  });
}

async function upload() {
  const form = new FormData();
  form.append("file", file.files[0]);

  await fetch("/upload", { method: "POST", body: form });
  load();
}

function download(name) {
  window.location = "/download/" + name;
}

async function del(name) {
  await fetch("/delete", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });
  load();
}

async function share(name) {
  const toUser = prompt("Enter username");
  await fetch("/share", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, toUser })
  });
  alert("Shared");
}

function logout() {
  window.location = "/logout";
}

load();
</script>

</body>
</html>
