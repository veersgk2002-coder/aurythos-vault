<!DOCTYPE html>
<html>
<head>
<title>Aurythos Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authBox">
<h2>Aurythos Vault</h2>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">

<button onclick="login()">Login</button>
<p id="msg"></p>

<p onclick="toggleRegister()">New user? Register</p>

<div id="registerBox" style="display:none;">
<input id="ruser" placeholder="Username">
<input id="rpass" placeholder="Password">
<button onclick="register()">Register</button>
</div>
</div>

<div id="vault" style="display:none;">
<h2>Your Vault</h2>

<input type="file" id="files" multiple>
<button onclick="upload()">Upload</button>
<button onclick="upgrade()">Upgrade ₹99</button>

<p id="limit"></p>

<div id="fileList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
